services:
  # Arrmate - AI natural language interface for Sonarr, Radarr, and Lidarr
  arrmate:
    image: techbutton/arrmate:latest
    container_name: arrmate
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["management", "all"]
    networks:
      - t3_proxy
    ports:
      - "$ARRMATE_PORT:8000"
    volumes:
      - $DOCKERDIR/appdata/arrmate:/data
    environment:
      TZ: $TZ
      # LLM backend — choose one: ollama, openai, anthropic
      # LLM_PROVIDER: ollama
      # OLLAMA_BASE_URL: http://ollama:11434
      # OLLAMA_MODEL: llama3
      # OPENAI_API_KEY: $OPENAI_API_KEY
      # ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY
      # Arr service URLs and API keys (set after installing each service)
      # SONARR_URL: http://sonarr:8989
      # SONARR_API_KEY: $SONARR_API_KEY
      # RADARR_URL: http://radarr:7878
      # RADARR_API_KEY: $RADARR_API_KEY
      # LIDARR_URL: http://lidarr:8686
      # LIDARR_API_KEY: $LIDARR_API_KEY
      # Download clients (optional)
      # SABNZBD_URL: http://sabnzbd:8080
      # SABNZBD_API_KEY: $SABNZBD_API_KEY
      # QBITTORRENT_URL: http://qbittorrent:8080
      # SECRET_KEY: changeme   # change for session persistence across restarts
    # DOCKER-LABELS-PLACEHOLDER
